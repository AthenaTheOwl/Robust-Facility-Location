name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall .

      - name: Smoke-test imports
        run: |
          python - <<'PY'
          import core.data
          import core.models
          import core.models_advanced
          import core.simulation
          import core.state
          import core.utils
          import viz.comparison
          import viz.network
          import viz.simulation_plots
          print("Imports OK")
          PY
